<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Barber Shop - Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container glass-effect">
            <div class="logo text-center mb-2">Smart<span>Barber</span></div>
            <h2 id="form-title">تسجيل الدخول</h2>
            <form id="auth-form">
                <div class="input-group" id="name-group" style="display:none;">
                    <label>الاسم بالكامل</label>
                    <input type="text" id="user-name" placeholder="أدخل اسمك">
                </div>
                <div class="input-group">
                    <label>البريد الإلكتروني أو الجوال</label>
                    <input type="text" id="user-email" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="user-pass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-1" id="submit-btn" style="margin-top: 1rem;">دخول</button>
            </form>
            <p class="toggle-text">ليس لديك حساب؟ <a href="#" id="toggle-form">سجل الآن</a></p>
            <div class="back-link">
                <a href="index.html">← العودة للرئيسية</a>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
